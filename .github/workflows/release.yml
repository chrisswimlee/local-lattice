name: Release

# Publishes to PyPI via OIDC trusted publishing on version tags (v0.2.0, …).
# One-time setup required on PyPI before the first release:
#   pypi.org → project "local-lattice" → Publishing → add GitHub publisher
#   (owner: chrisswimlee, repo: local-lattice, workflow: release.yml,
#    environment: pypi). No API token or repo secret is needed.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - name: Validate metadata
        run: |
          pip install twine
          twine check dist/*
      - name: Check tag matches project version
        run: |
          pip install tomli 2>/dev/null || true
          VERSION="$(python -c 'import tomllib;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag v$TAG does not match pyproject version $VERSION" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/local-lattice
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
